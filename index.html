<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Calix Mojica is one of Auckland’s emerging young real estate professionals, combining modern marketing strategies with a strong background in property management and a Bachelor of Property from the University of Auckland.">
<title>Calix Mojica</title>

<!-- Favicon -->
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- JSON-LD structured data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Calix Mojica",
  "url": "https://www.calixmojica.com/"
}
</script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
  margin: 0;
  padding: 0;
  background-color: #fafafb;
  color: #000;
  text-align: center;
  overflow-x: hidden;
}
img.headshot {
  width: 180px;
  height: 180px;
  margin-top: 40px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(8px) saturate(180%);
  box-shadow: inset 0 0 15px rgba(255,255,255,0.15), 0 15px 35px rgba(0,0,0,0.12);
  transition: transform 0.25s ease;
  position: relative;
}
img.headshot:hover { transform: scale(1.03); }
h1 { font-size: 2.8em; margin: 20px 0 10px; font-weight: 700; }
.intro { font-size: 1.1em; margin-bottom: 30px; }

.properties-container {
  background: rgba(255,255,255,0.03);
  border-radius: 28px;
  padding: 35px 30px;
  max-width: 900px;
  margin: 0 auto 50px auto;
  backdrop-filter: blur(8px) saturate(180%);
  box-shadow: inset 0 0 15px rgba(255,255,255,0.12), 0 25px 50px rgba(0,0,0,0.12);
  text-align: left;
  position: relative;
  overflow: hidden;
}

.properties-header {
  display: flex;
  justify-content: space-between;
  padding: 0 30px;
  margin-bottom: 20px;
  font-weight: 700;
  font-size: 1.4em;
  cursor: pointer;
}
.tab { flex: 1; text-align: center; opacity: 0.4; transition: opacity 0.2s ease, color 0.2s ease; }
.tab.active { opacity: 1; color: #000; }

.property-item { margin-bottom: 30px; }
.property-image {
  width: 100%;
  padding-top: 56.25%;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(8px) saturate(180%);
  box-shadow: inset 0 0 15px rgba(255,255,255,0.12), 0 15px 35px rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.property-image:hover { transform: scale(1.02); }
.property-address { font-weight: bold; text-align: center; margin-top: 10px; }

.disclaimer {
  font-size: 0.8em;
  color: #555;
  font-style: italic;
  margin-bottom: 25px;
  text-align: center;
}

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  align-items: center;
  justify-content: center;
  z-index: 1000;
  overflow-y: auto;
}
.modal {
  max-width: 700px;
  padding: 35px;
  position: relative;
  color: #000;
  text-align: left;
  border-radius: 28px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(14px) saturate(180%);
  -webkit-backdrop-filter: blur(14px) saturate(180%);
  box-shadow: inset 0 0 20px rgba(255,255,255,0.25), 0 25px 50px rgba(0,0,0,0.15);
}
.modal button {
  position: absolute;
  top: 15px;
  right: 15px;
  font-size: 1.2em;
  font-weight: 700;
  color: #000;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 10;
}
</style>
</head>

<body>

<img src="headshot.jpg" alt="Calix Mojica" class="headshot">
<h1>Calix Mojica</h1>
<p class="intro">This website is currently under development</p>

<div class="social-buttons" style="display:flex; flex-direction:column; gap:20px; align-items:center; margin-bottom:40px;">
  <glass-element onclick="openModal()" width="260" height="60" radius="24" depth="8" blur="10" strength="40" background-color="rgba(255,255,255,0.25)" chromatic-aberration="2">
      About Me
  </glass-element>
  <glass-element width="260" height="60" radius="24" depth="8" blur="10" strength="40" background-color="rgba(255,255,255,0.25)" chromatic-aberration="2">
      Enquire Now
  </glass-element>
  <glass-element onclick="window.open('https://www.instagram.com/CalixMojica','_blank')" width="260" height="60" radius="24" depth="8" blur="10" strength="40" background-color="rgba(255,255,255,0.25)" chromatic-aberration="2">
      Instagram
  </glass-element>
  <glass-element onclick="window.open('https://www.youtube.com/@CalixMojica','_blank')" width="260" height="60" radius="24" depth="8" blur="10" strength="40" background-color="rgba(255,255,255,0.25)" chromatic-aberration="2">
      YouTube
  </glass-element>
</div>

<div class="properties-container">
  <div class="properties-header">
    <div class="tab active" id="currentTab" onclick="switchTab('current')">CURRENT</div>
    <div class="tab" id="soldTab" onclick="switchTab('sold')">SOLD</div>
  </div>

  <div id="currentContent">
    <div class="property-item">
      <div class="property-image"></div>
      <div class="property-address">Coming Soon</div>
    </div>
  </div>

  <div id="soldContent" style="display:none;">
    <p class="disclaimer">Currently undergoing one last paper to process my real estate license</p>
    <div class="property-item">
      <div class="property-image"></div>
      <div class="property-address">Untitled</div>
    </div>
  </div>
</div>

<!-- KEEPING YOUR ORIGINAL GLASS + MODAL SCRIPTS BELOW UNCHANGED -->
<script>
function openModal() { document.getElementById('aboutModal').style.display='flex'; document.body.style.overflow='hidden'; }
function closeModal() { document.getElementById('aboutModal').style.display='none'; document.body.style.overflow='auto'; }

function switchTab(tab){
  if(tab==='sold'){
    document.getElementById('currentContent').style.display='none';
    document.getElementById('soldContent').style.display='block';
    document.getElementById('currentTab').classList.remove('active');
    document.getElementById('soldTab').classList.add('active');
  } else {
    document.getElementById('currentContent').style.display='block';
    document.getElementById('soldContent').style.display='none';
    document.getElementById('currentTab').classList.add('active');
    document.getElementById('soldTab').classList.remove('active');
  }
}
</script>

</body>
</html>
